<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cap. 05 - AT03 - Formulário de Matrícula Acadêmica</title>
</head>

<body>
    <header>
        <h1>Solicitação de Matrícula</h1>
    </header>

    <main>
        <form action="https://httpbin.org/post" method="post">
            
            <p><small>* Campos obrigatórios</small></p>

            <fieldset>
                <legend>Dados Pessoais</legend>

                <div class="campo">
                    <label for="nome">Nome completo: <span aria-hidden="true">*</span></label>
                    <input type="text" id="nome" name="nome" required minlength="5" maxlength="100" autocomplete="name" />
                </div>

                <div class="campo">
                    <label for="cpf">CPF: <span aria-hidden="true">*</span></label>
                    <input type="text" id="cpf" name="cpf" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" 
                        placeholder="000.000.000-00" title="CPF no formato 000.000.000-00" />
                </div>

                <div class="campo">
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" pattern="\(\d{2}\)\s\d{4,5}-\d{4}" 
                        placeholder="(82) 99999-9999" autocomplete="tel" />
                </div>

                <div class="campo">
                    <label for="email">E-mail: <span aria-hidden="true">*</span></label>
                    <input type="email" id="email" name="email" required autocomplete="email" />
                </div>
            </fieldset>

            <fieldset>
                <legend>Dados Acadêmicos</legend>

                <div class="campo">
                    <label for="curso">Curso: <span aria-hidden="true">*</span></label>
                    <select id="curso" name="curso" required>
                        <option value="" disabled selected>Selecione um curso...</option>
                        
                        <optgroup label="Computação">
                            <option value="sistemas_informacao">Sistemas de Informação</option>
                            <option value="ciencia_computacao">Ciência da Computação</option>
                            <option value="engenharia_computacao">Engenharia da Computação</option>
                        </optgroup>
                        
                        <optgroup label="Gestão">
                            <option value="administracao">Administração</option>
                            <option value="ciencias_contaibeis">Ciências Contábeis</option>
                        </optgroup>
                    </select>
                </div>

                <fieldset>
                    <legend>Período <span aria-hidden="true">*</span></legend>
                    <div>
                        <input type="radio" id="per-manha" name="periodo" value="manha" required />
                        <label for="per-manha">Manhã</label>
                    </div>
                    <div>
                        <input type="radio" id="per-tarde" name="periodo" value="tarde" />
                        <label for="per-tarde">Tarde</label>
                    </div>
                    <div>
                        <input type="radio" id="per-noite" name="periodo" value="noite" />
                        <label for="per-noite">Noite</label>
                    </div>
                </fieldset>

                <div class="campo">
                    <label for="ano_ingresso">Ano de ingresso pretendido: <span aria-hidden="true">*</span></label>
                    <input type="number" id="ano_ingresso" name="ano_ingresso" min="2025" max="2030" required />
                </div>
            </fieldset>

            <fieldset>
                <legend>Áreas de Interesse</legend>
                
                <div>
                    <input type="checkbox" id="int-web" name="interesses[]" value="desenvolvimento_web" />
                    <label for="int-web">Desenvolvimento Web</label>
                </div>
                <div>
                    <input type="checkbox" id="int-bd" name="interesses[]" value="banco_dados" />
                    <label for="int-bd">Banco de Dados</label>
                </div>
                <div>
                    <input type="checkbox" id="int-ia" name="interesses[]" value="inteligencia_artificial" />
                    <label for="int-ia">Inteligência Artificial</label>
                </div>
                <div>
                    <input type="checkbox" id="int-seg" name="interesses[]" value="seguranca_informacao" />
                    <label for="int-seg">Segurança da Informação</label>
                </div>
                <div>
                    <input type="checkbox" id="int-infra" name="interesses[]" value="infraestrutura" />
                    <label for="int-infra">Infraestrutura</label>
                </div>
            </fieldset>

            <div class="acoes">
                <button type="reset">Limpar formulário</button>
                <button type="submit">Solicitar matrícula</button>
            </div>

        </form>
    </main>

    <p><a href="../index.html">← Voltar à página principal</a></p>

</body>

</html>
