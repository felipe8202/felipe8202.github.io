<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cap. 05 - AT02 - Cadastro de Usuário</title>
</head>

<body>
    <header>
        <h1>Cadastro de Usuário</h1>
    </header>

    <main>
        <form action="https://httpbin.org/post" method="post">
            
            <small>* Campos obrigatórios</small>

            <fieldset>
                <legend>Dados Pessoais</legend>
                <div class="campo">
                    <label for="nome">Nome completo: <span aria-hidden="true">*</span></label>
                    <input type="text" id="nome" name="nome" required minlength="3" maxlength="100" autocomplete="name"
                        placeholder="Ex: João Silva" />
                </div>
                <div class="campo">
                    <label for="email">E-mail: <span aria-hidden="true">*</span></label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                        placeholder="exemplo@exemplo.com" />
                </div>
                <div class="campo">
                    <label for="senha">Senha: <span aria-hidden="true">*</span></label>
                    <input type="password" id="senha" name="senha" required minlength="8"
                        pattern="(?=.*[A-Za-z])(?=.*\d).{8,}"
                        title="Mínimo de 8 caracteres, incluindo ao menos uma letra e um número" />
                </div>
                <div class="campo">
                    <label for="nascimento">Data de nascimento: <span aria-hidden="true">*</span></label>
                    <input type="date" id="nascimento" name="nascimento" required min="1900-01-01" max="2010-12-31" />
                </div>
            </fieldset>

            <fieldset>
                <legend>Gênero</legend>
                <div>
                    <input type="radio" id="gen-masc" name="genero" value="masculino" />
                    <label for="gen-masc">Masculino</label>
                </div>
                <div>
                    <input type="radio" id="gen-fem" name="genero" value="feminino" />
                    <label for="gen-fem">Feminino</label>
                </div>
                <div>
                    <input type="radio" id="gen-outro" name="genero" value="outro" />
                    <label for="gen-outro">Outro</label>
                </div>
                <div>
                    <input type="radio" id="gen-prefiro-nao" name="genero" value="prefiro_nao_informar" />
                    <label for="gen-prefiro-nao">Prefiro não informar</label>
                </div>
            </fieldset>

            <div class="campo">
                <input type="checkbox" id="aceite" name="aceite" value="sim" required />
                <label for="aceite">Li e aceito os termos de uso.</label>
            </div>

            <div class="acoes">
                <button type="reset">Limpar campos</button>
                <button type="submit">Criar conta</button>
            </div>

        </form>
    </main>

    <p><a href="../index.html">← Voltar à página principal</a></p>

</body>

</html>
