<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cap. 05 - AT01 - Formulário de Contato Simples</title>
</head>

<body>

    <header>
        <h1>Formulário de Contato Simples</h1>
    </header>

    <main>
        <form action="https://httpbin.org/get" method="get">
            
            <small>* Campos obrigatórios</small>

            <fieldset>
                <legend>Dados Pessoais</legend>
                <div class="campo">
                    <label for="nome">Nome completo: <span aria-hidden="true">*</span>
                    </label>
                    <input type="text" id="nome" name="nome" required minlength="3" maxlength="100"
                        autocomplete="name" placeholder="Ex: João Silva"/>
                </div>
                <div class="campo">
                    <label for="email">E-mail: <span aria-hidden="true">*</span></label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                        placeholder="exemplo@exemplo.com" />
                </div>
            </fieldset>
            <fieldset>
                <legend>Assunto e Mensagem</legend>
                <div class="campo">
                    <label for="assunto">Assunto <span aria-hidden="true">*</span></label>
                    <input type="text" id="assunto" required name="assunto" maxlength="200" 
                        placeholder="Informe o assunto" />
                </div>
                <div class="campo">
                    <label for="mensagem">Mensagem: <span aria-hidden="true">*</span></label>
                    <textarea id="mensagem" name="mensagem" required minlength="20" maxlength="1000" rows="5" cols="80"
                        placeholder="Descreva sua solicitação com detalhes..."></textarea>
                </div>
            </fieldset>

            <div class="acoes">
                <button type="submit">Enviar mensagem</button>
            </div>

        </form>
    </main>

    <p><a href="../index.html">← Voltar à página principal</a></p>
</body>

</html>
