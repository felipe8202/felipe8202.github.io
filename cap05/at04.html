<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cap. 05 - AT04 - Inscrição em Evento com Campos Avançados</title>
</head>

<body>
    <header>
        <h1>Semana de Tecnologia IFAL - Inscrição</h1>
    </header>

    <main>
        <form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">
            
            <p><small>* Campos obrigatórios</small></p>

            <input type="hidden" name="edicao" value="2026" />

            <fieldset>
                <legend>Identificação do participante</legend>

                <div class="campo">
                    <label for="nome">Nome completo: <span aria-hidden="true">*</span></label>
                    <input type="text" id="nome" name="nome" required autocomplete="name" />
                </div>

                <div class="campo">
                    <label for="email">E-mail institucional: <span aria-hidden="true">*</span></label>
                    <input type="email" id="email" name="email" required autocomplete="email" />
                </div>

                <div class="campo">
                    <label for="cidade">Cidade de origem:</label>
                    <input type="text" id="cidade" name="cidade" list="cidades-al" autocomplete="address-level2" />
                    <datalist id="cidades-al">
                        <option value="Maceió"></option>
                        <option value="Arapiraca"></option>
                        <option value="Rio Largo"></option>
                        <option value="Palmeira dos Índios"></option>
                        <option value="União dos Palmares"></option>
                        <option value="Penedo"></option>
                        <option value="São Miguel dos Campos"></option>
                        <option value="Coruripe"></option>
                    </datalist>
                </div>

                <div class="campo">
                    <label for="foto">Foto para crachá:</label>
                    <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" aria-describedby="dica-foto" />
                    <br>
                    <small id="dica-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>
                </div>
            </fieldset>

            <fieldset>
                <legend>Preferências para o evento</legend>

                <div class="campo">
                    <label for="chegada">Data e hora preferida para chegada:</label>
                    <input type="datetime-local" id="chegada" name="chegada" />
                </div>

                <div class="campo">
                    <label for="experiencia">
                        Nível de experiência: <span id="valor-experiencia">5</span>/10
                    </label>
                    <input 
                        type="range" 
                        id="experiencia" 
                        name="experiencia" 
                        min="0" max="10" step="1" value="5" 
                        oninput="document.getElementById('valor-experiencia').textContent = this.value" 
                    />
                </div>

                <div class="campo">
                    <label for="cor_camiseta">Cor de preferência para a camiseta:</label>
                    <input type="color" id="cor_camiseta" name="cor_camiseta" value="#1a73e8" />
                </div>

                <div class="campo">
                    <label for="oficinas">Oficinas de interesse:</label>
                    <select id="oficinas" name="oficinas[]" multiple size="4" aria-describedby="dica-oficinas">
                        <option value="frontend">Desenvolvimento Front-end</option>
                        <option value="backend">Desenvolvimento Back-end</option>
                        <option value="design_ux">Design e UX</option>
                        <option value="dados">Ciência de Dados</option>
                        <option value="seguranca">Segurança Cibernética</option>
                        <option value="devops">DevOps e Cloud</option>
                    </select>
                    <br>
                    <small id="dica-oficinas">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>
                </div>
            </fieldset>

            <div class="acoes">
                <button type="submit">Confirmar inscrição</button>
            </div>

        </form>
    </main>

    <p><a href="../index.html">← Voltar à página principal</a></p>

</body>

</html>
